<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | WELLDONE GROUP</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #ea580c;
    --orange-light: #f97316;
    --bg: #0B1120;
    --panel: #0f1a2e;
    --border: #1e293b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --dim: #475569;
  }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Canvas background ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Animated orbs ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    z-index: 1;
    pointer-events: none;
    animation: orbFloat linear infinite;
  }
  .orb-1 {
    width: 520px; height: 520px;
    background: radial-gradient(circle, rgba(234,88,12,0.18) 0%, transparent 70%);
    top: -160px; right: -80px;
    animation-duration: 18s;
  }
  .orb-2 {
    width: 440px; height: 440px;
    background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
    bottom: -120px; left: -120px;
    animation-duration: 22s;
    animation-direction: reverse;
  }
  .orb-3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(168,85,247,0.08) 0%, transparent 70%);
    top: 40%; left: 30%;
    animation-duration: 28s;
  }
  @keyframes orbFloat {
    0%   { transform: translate(0, 0) scale(1); }
    25%  { transform: translate(30px, -20px) scale(1.04); }
    50%  { transform: translate(-20px, 30px) scale(0.97); }
    75%  { transform: translate(20px, 20px) scale(1.02); }
    100% { transform: translate(0, 0) scale(1); }
  }

  /* ── Login card ── */
  .login-wrapper {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    padding: 20px;
    animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes cardEntrance {
    from { opacity: 0; transform: translateY(32px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .login-card {
    background: rgba(15, 26, 46, 0.75);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 24px;
    padding: 44px 40px;
    box-shadow:
      0 0 0 1px rgba(234,88,12,0.06),
      0 32px 64px -16px rgba(0,0,0,0.6),
      0 0 80px -20px rgba(234,88,12,0.12);
    position: relative;
    overflow: hidden;
  }

  /* subtle animated border shimmer */
  .login-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    padding: 1px;
    background: linear-gradient(135deg,
      rgba(234,88,12,0.4) 0%,
      transparent 40%,
      transparent 60%,
      rgba(59,130,246,0.2) 100%
    );
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0.6;
    animation: borderRotate 6s linear infinite;
    pointer-events: none;
  }
  @keyframes borderRotate {
    0%   { background-position: 0% 0%; }
    100% { background-position: 200% 200%; }
  }

  /* ── Logo area ── */
  .logo-area {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeDown 0.7s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .logo-area img {
    height: 38px;
    width: auto;
    margin: 0 auto 20px auto;
    display: block;
    filter: drop-shadow(0 0 12px rgba(234,88,12,0.3));
  }
  .logo-divider {
    width: 40px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--orange), transparent);
    margin: 16px auto 0;
    border-radius: 2px;
  }

  /* ── Form ── */
  .form-section {
    animation: fadeUp 0.7s 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .form-group { margin-bottom: 20px; }
  .form-label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    transition: color 0.2s;
  }
  .form-group:focus-within .form-label { color: var(--orange); }

  .input-wrap { position: relative; }
  .form-input {
    width: 100%;
    background: rgba(11,17,32,0.8);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 14px;
    font-family: 'Space Grotesk', sans-serif;
    outline: none;
    transition: all 0.25s;
  }
  .form-input:focus {
    border-color: var(--orange);
    background: rgba(11,17,32,1);
    box-shadow: 0 0 0 3px rgba(234,88,12,0.12), 0 0 20px -8px rgba(234,88,12,0.3);
  }
  .form-input::placeholder { color: var(--dim); }

  /* eye button */
  .eye-btn {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    cursor: pointer; color: var(--dim);
    padding: 0; display: flex;
    align-items: center;
    transition: color 0.2s;
  }
  .eye-btn:hover { color: var(--muted); }

  /* ── Submit button ── */
  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    color: white;
    border: none;
    padding: 15px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 4px 20px rgba(234,88,12,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 28px;
    position: relative;
    overflow: hidden;
  }
  .btn-primary::after {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 40%; height: 200%;
    background: rgba(255,255,255,0.15);
    transform: skewX(-20deg);
    animation: shimmer 3.5s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%   { left: -60%; }
    50%  { left: 130%; }
    100% { left: 130%; }
  }
  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(234,88,12,0.45);
  }
  .btn-primary:active:not(:disabled) { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

  /* ── Links ── */
  .link {
    color: var(--orange);
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
    transition: color 0.2s;
    cursor: pointer;
  }
  .link:hover { color: var(--orange-light); text-decoration: underline; }

  /* ── Footer strip ── */
  .card-footer {
    margin-top: 32px;
    text-align: center;
    font-size: 13px;
    color: var(--dim);
    border-top: 1px solid rgba(255,255,255,0.05);
    padding-top: 24px;
  }

  /* ── Toast ── */
  #toast {
    position: fixed; top: 24px; right: 24px;
    z-index: 9999;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast-item {
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    animation: toastIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(24px) scale(0.96); }
    to   { opacity: 1; transform: translateX(0) scale(1); }
  }

  /* ── Floating dots decoration ── */
  .dot-grid {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background-image: radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 32px 32px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
  }

  /* ── Scanning line ── */
  .scan-line {
    position: fixed;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(234,88,12,0.25) 30%, rgba(234,88,12,0.5) 50%, rgba(234,88,12,0.25) 70%, transparent 100%);
    z-index: 2;
    pointer-events: none;
    animation: scanDown 8s linear infinite;
  }
  @keyframes scanDown {
    0%   { top: -2px; opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    100% { top: 100vh; opacity: 0; }
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Home button ── */
  .home-btn {
    position: fixed;
    top: 20px; right: 24px;
    z-index: 100;
    display: flex; align-items: center; gap: 8px;
    padding: 9px 18px;
    background: rgba(234,88,12,0.1);
    border: 1px solid rgba(234,88,12,0.35);
    border-radius: 100px;
    color: #f97316;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px; font-weight: 600;
    text-decoration: none;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: all 0.25s;
    animation: fadeDown 0.6s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .home-btn:hover {
    background: rgba(234,88,12,0.22);
    border-color: rgba(234,88,12,0.7);
    color: #fff;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(234,88,12,0.25);
  }

  /* ── Faint padlock watermark ── */
  .padlock-bg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(520px, 85vw);
    height: min(520px, 85vw);
    z-index: 2;
    pointer-events: none;
    color: rgba(234, 88, 12, 0.055);
    filter: blur(0.5px);
    animation: padlockPulse 8s ease-in-out infinite;
  }
  .padlock-bg svg {
    width: 100%;
    height: 100%;
  }
  @keyframes padlockPulse {
    0%, 100% { opacity: 1;    transform: translate(-50%, -50%) scale(1); }
    50%       { opacity: 0.7; transform: translate(-50%, -50%) scale(1.03); }
  }

  @media (max-width: 480px) {
    .login-card { padding: 32px 24px; border-radius: 20px; }
    .login-wrapper { padding: 16px; }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="dot-grid"></div>
<div class="scan-line"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Faint padlock watermark -->
<div class="padlock-bg">
  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" stroke-width="1.2"/>

</div>

<a href="index.html" class="home-btn">

<div class="login-wrapper">

      <h1 id="header-title" style="font-size:22px; font-weight:700; color:#fff; letter-spacing:-0.02em; margin-bottom:6px;">Welcome Back</h1>

        <div class="form-group">

          <div class="input-wrap">
            <input type="password" id="password" required class="form-input" placeholder="••••••••" style="padding-right:44px;">

              <svg id="eye-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>

          <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>

        </div>
      </form>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://eftexnivgkchhrulryan.supabase.co';
const SUPABASE_KEY = 'sb_publishable_PTpRBa91vJXaLpV6Ku29bQ_tz33JHRD';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ── Particle canvas ── */
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function randomBetween(a, b) { return a + Math.random() * (b - a); }

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x  = randomBetween(0, W);
      this.y  = randomBetween(0, H);
      this.vx = randomBetween(-0.15, 0.15);
      this.vy = randomBetween(-0.3, -0.05);
      this.r  = randomBetween(0.6, 1.8);
      this.alpha = randomBetween(0.1, 0.5);
      this.life = 0;
      this.maxLife = randomBetween(200, 500);
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.life++;
      if (this.life > this.maxLife || this.y < -10) this.reset();
    }
    draw() {
      const progress = this.life / this.maxLife;
      const a = this.alpha * Math.sin(Math.PI * progress);
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(234,88,12,${a})`;
      ctx.fill();
    }
  }

  for (let i = 0; i < 80; i++) {
    const p = new Particle();
    p.life = Math.floor(Math.random() * p.maxLife); // stagger start
    particles.push(p);
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }
  loop();
})();

/* ── Mouse parallax on orbs ── */
document.addEventListener('mousemove', (e) => {
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  const dx = (e.clientX - cx) / cx, dy = (e.clientY - cy) / cy;
  document.querySelector('.orb-1').style.transform = `translate(${dx * 20}px, ${dy * 15}px)`;
  document.querySelector('.orb-2').style.transform = `translate(${dx * -15}px, ${dy * -20}px)`;
  document.querySelector('.orb-3').style.transform = `translate(${dx * 10}px, ${dy * 10}px)`;
});

/* ── Toast ── */
function showToast(type, msg) {
  const container = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = 'toast-item';
  el.style.background = type === 'error' ? '#2d0d0d' : '#052e16';
  el.style.border = type === 'error' ? '1px solid #7f1d1d' : '1px solid #166534';
  el.style.color  = type === 'error' ? '#f87171' : '#4ade80';
  el.innerHTML = msg;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 5000);
}

/* ── Toggle views ── */
function toggleViews(view) {
  if (view === 'forgot') {
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('forgot-section').style.display = 'block';
    document.getElementById('header-title').innerText = 'Reset Password';
    document.getElementById('header-sub').innerText = 'Enter your email to receive a recovery link';
  } else {
    document.getElementById('forgot-section').style.display = 'none';
    document.getElementById('login-section').style.display = 'block';
    document.getElementById('header-title').innerText = 'Welcome Back';
    document.getElementById('header-sub').innerText = 'Sign in to the WELLDONE Command Center';
  }
}

/* ── Login ── */
async function handleLogin(e) {
  e.preventDefault();
  const emailInput = document.getElementById('email').value.trim();
  const passInput  = document.getElementById('password').value;
  const btn = document.getElementById('submit-btn');
  if (!emailInput || !passInput) return;

  btn.disabled = true;
  btn.innerHTML = `<div style="width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;"></div> Authenticating...`;

  try {
    const { data: authData, error: authError } = await sb.auth.signInWithPassword({ email: emailInput, password: passInput });
    if (authError) throw authError;

    btn.innerHTML = `<div style="width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;"></div> Routing...`;

    const userEmail = authData.user.email;

    const { data: adminData } = await sb.from('admin_users').select('id').eq('user_id', authData.user.id).maybeSingle();
    if (adminData) { setTimeout(() => window.location.href = 'admin-dashboard.html', 400); return; }

    const { data: wData } = await sb.from('workers').select('id').eq('email', userEmail).single();
    if (wData) { localStorage.setItem('welldone_worker_id', wData.id); setTimeout(() => window.location.href = 'worker-dashboard.html', 400); return; }

    const { data: cData } = await sb.from('companies').select('id').eq('corporate_email', userEmail).single();
    if (cData) { localStorage.setItem('welldone_client_id', cData.id); setTimeout(() => window.location.href = 'client-dashboard.html', 400); return; }

    throw new Error('No profile linked to this account. Please contact support.');

  } catch (error) {
    showToast('error', error.message);
    btn.disabled = false;
    btn.innerHTML = `Sign In Securely <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
  }
}

/* ── Reset password ── */
async function handleResetPassword(e) {
  e.preventDefault();
  const emailInput = document.getElementById('reset-email').value.trim();
  const btn = document.getElementById('reset-btn');
  btn.disabled = true;
  btn.innerHTML = 'Sending...';
  try {
    const { error } = await sb.auth.resetPasswordForEmail(emailInput, {
      redirectTo: window.location.origin + '/reset-password.html',
    });
    if (error) throw error;
    showToast('success', 'Recovery link sent! Check your inbox.');
    setTimeout(() => toggleViews('login'), 3000);
  } catch (error) {
    showToast('error', error.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Send Recovery Link';
  }
}

/* ── Toggle password visibility ── */
function togglePassword() {
  const input = document.getElementById('password');
  const icon  = document.getElementById('eye-icon');
  const isHidden = input.type === 'password';
